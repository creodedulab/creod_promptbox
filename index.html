<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creod Prompt Box</title>
    <link rel="stylesheet" href="styles.css?v=20260602-2" />
  </head>
  <body>
    <header class="site-header">
      <nav class="topbar" aria-label="주요 메뉴">
        <a class="brand" href="#">
          <img class="brand-logo" src="images/logo.png" alt="" />
          <span>Creod Prompt Box</span>
        </a>
      </nav>

      <section class="hero">
        <h1 class="hero-title">Creod Prompt Box</h1>
      </section>
    </header>

    <main class="gallery-page">
      <section class="toolbar" aria-label="갤러리 필터">
        <form class="search-form" role="search">
          <label class="sr-only" for="searchInput">갤러리 검색</label>
          <input
            id="searchInput"
            type="search"
            placeholder="예: 광고포스터, 엑셀, 구글시트, 슬라이드"
            autocomplete="off"
          />
        </form>

        <div class="category-tabs" aria-label="메인 카테고리">
          <button class="tab active" type="button" data-main-category="all">전체</button>
          <button class="tab" type="button" data-main-category="image">이미지</button>
          <button class="tab" type="button" data-main-category="vba">VBA</button>
          <button class="tab" type="button" data-main-category="appscript">앱스스크립트</button>
          <button class="tab" type="button" data-main-category="notebooklm">노트북LM</button>
        </div>

        <div class="subcategory-tabs" id="subcategoryTabs" aria-label="세부 카테고리"></div>
      </section>

      <section class="gallery-section" aria-labelledby="galleryTitle">
        <div class="section-head">
          <div>
            <h2 id="galleryTitle">결과물 예시</h2>
          </div>
          <p id="resultCount"></p>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>
        <p class="empty-state" id="emptyState" hidden>조건에 맞는 결과물이 없습니다.</p>
      </section>
    </main>

    <div class="modal" id="promptModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <section
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <button class="modal-close" type="button" aria-label="닫기" data-close-modal>×</button>
        <div class="modal-preview">
          <div class="modal-image" id="modalImage"></div>
          <button class="expand-image-button" type="button" id="expandImage">
            이미지 크게 보기
          </button>
          <div class="zoom-control">
            <label for="imageZoom">돋보기</label>
            <input id="imageZoom" type="range" min="100" max="500" value="100" step="10" />
            <span id="imageZoomValue">100%</span>
          </div>
        </div>
        <div class="modal-content">
          <span class="badge" id="modalCategory"></span>
          <h2 id="modalTitle"></h2>
          <p class="source-notice">
            프롬프트 사용 시 출처를 남겨주세요. 출처: Creod Prompt Box
          </p>
          <div class="prompt-actions">
            <button class="copy-button" type="button" id="copyModalPrompt">최종 프롬프트 복사</button>
            <a class="ai-link" href="https://chat.openai.com/" target="_blank" rel="noreferrer">GPT</a>
            <a class="ai-link" href="https://gemini.google.com/" target="_blank" rel="noreferrer">GEMINI</a>
            <a class="ai-link" href="https://grok.com/" target="_blank" rel="noreferrer">GROK</a>
          </div>
          <p id="modalDescription"></p>
          <div class="variable-panel" id="variablePanel">
            <h3>변수 입력</h3>
            <p>적용할 변수만 선택한 뒤 최종 프롬프트에 반영하세요.</p>
            <div class="variable-list" id="variableList"></div>
            <div class="variable-actions" id="variableActions">
              <button class="secondary-button" type="button" id="generatePrompt">
                변경된 프롬프트 생성
              </button>
              <button class="secondary-button subtle" type="button" id="resetPrompt">
                원래 프롬프트로 되돌리기
              </button>
            </div>
          </div>
          <div class="final-panel">
            <div class="final-panel-head">
              <h3>최종 프롬프트</h3>
              <button class="view-full-prompt" type="button" id="viewFullPrompt">
                전체보기
              </button>
            </div>
            <div class="prompt-detail" id="finalPrompt"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
      <button class="lightbox-close" type="button" id="closeLightbox" aria-label="닫기">×</button>
      <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
      <div class="lightbox-image" id="lightboxImage"></div>
    </div>

    <div class="prompt-lightbox" id="promptLightbox" aria-hidden="true">
      <div class="prompt-lightbox-backdrop" id="promptLightboxBackdrop"></div>
      <section
        class="prompt-lightbox-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="promptLightboxTitle"
      >
        <button class="lightbox-close" type="button" id="closePromptLightbox" aria-label="닫기">×</button>
        <h2 id="promptLightboxTitle">최종 프롬프트</h2>
        <div class="full-prompt-text" id="fullPromptText"></div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">프롬프트가 복사되었습니다.</div>

    <script src="script.js?v=20260602-2"></script>
  </body>
</html>
