<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creod Prompt Box</title>
    <link rel="icon" href="images/logo.png" />
    <link rel="stylesheet" href="styles.css?v=20260626-1" />
  </head>
  <body data-page="home" data-base-path="">
    <section class="hero">
      <h1 class="hero-title" aria-label="TTingSSam's Prompt Box">
        <span class="hero-title-kicker">TTingSSam's</span>
        <span class="hero-title-main">Prompt Box</span>
      </h1>
      <div class="hero-links" aria-label="외부 링크">
        <a
          class="hero-link"
          href="https://creodedulab.github.io/creod_promptbox/"
          aria-label="홈페이지 열기"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 10.6 12 3l9 7.6v9.9a.5.5 0 0 1-.5.5h-5.2v-6.4H8.7V21H3.5a.5.5 0 0 1-.5-.5v-9.9Z" />
          </svg>
        </a>
        <a
          class="hero-link"
          href="https://www.instagram.com/tting_ssam"
          target="_blank"
          rel="noreferrer"
          aria-label="인스타그램 열기"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="4" y="4" width="16" height="16" rx="4.5" />
            <circle cx="12" cy="12" r="3.4" />
            <circle cx="16.8" cy="7.2" r="1" />
          </svg>
          <span>Instagram</span>
        </a>
        <a
          class="hero-link"
          href="https://www.threads.com/@tting_ssam"
          target="_blank"
          rel="noreferrer"
          aria-label="스레드 열기"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M16.7 10.8c-.4-3-2-4.6-4.8-4.6-3.1 0-5.2 2.3-5.2 5.8 0 3.7 2.2 6 5.5 6 2.1 0 3.7-.9 4.6-2.4.9-1.5.6-3.4-.8-4.3-1.2-.8-3-.8-4.4-.2" />
            <path d="M11.5 14.9c-1.3 0-2.2-.6-2.2-1.6s.9-1.7 2.4-1.7c1 0 2 .2 2.9.5" />
            <path d="M18.9 8.6C17.8 5.4 15.3 3.7 12 3.7 7.2 3.7 4 7.1 4 12s3.3 8.3 8.2 8.3c3.1 0 5.6-1.4 6.9-3.9" />
          </svg>
          <span>Thread</span>
        </a>
        <a class="hero-link" href="maker/index.html" aria-label="Maker 페이지 열기">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M5 16.5c2.1 1.1 4.4 1.7 7 1.7s4.9-.6 7-1.7" />
            <path d="M8.2 16.9 11.2 5c.2-.8 1.4-.8 1.6 0l3 11.9" />
            <path d="M9 10.8c1.9.8 4.1.8 6 0" />
            <path d="M6.2 16.2c.7-1.1 2.7-1.9 5.8-1.9s5.1.8 5.8 1.9" />
            <path d="M4.8 5.2h1.4" />
            <path d="M5.5 4.5v1.4" />
            <path d="M18.2 7.2h1.6" />
            <path d="M19 6.4V8" />
          </svg>
          <span>Maker</span>
        </a>
        <button
          class="theme-toggle"
          type="button"
          id="themeToggle"
          aria-label="블랙 테마로 변경"
          title="테마 변경"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <circle class="sun-core" cx="12" cy="12" r="4.2" />
            <path d="M12 2.8v2" />
            <path d="M12 19.2v2" />
            <path d="M4.9 4.9 6.3 6.3" />
            <path d="m17.7 17.7 1.4 1.4" />
            <path d="M2.8 12h2" />
            <path d="M19.2 12h2" />
            <path d="m4.9 19.1 1.4-1.4" />
            <path d="m17.7 6.3 1.4-1.4" />
          </svg>
        </button>
      </div>
    </section>

    <main class="gallery-page">
      <section class="toolbar" aria-label="갤러리 필터">
        <form class="search-form" role="search">
          <label class="sr-only" for="searchInput">갤러리 검색</label>
          <input
            id="searchInput"
            type="search"
            placeholder="예: 광고포스터, 엑셀, 구글시트, 슬라이드"
            autocomplete="off"
          />
          <button class="search-button" type="submit" aria-label="검색">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <path d="m16 16 4 4" />
            </svg>
          </button>
        </form>

        <div class="category-tabs" aria-label="메인 카테고리">
          <button class="tab active" type="button" data-main-category="all">전체</button>
          <button class="tab" type="button" data-main-category="image">이미지</button>
          <button class="tab" type="button" data-main-category="vba">VBA</button>
          <button class="tab" type="button" data-main-category="appscript">앱스스크립트</button>
          <button class="tab" type="button" data-main-category="notebooklm">노트북LM</button>
        </div>

        <div class="subcategory-tabs" id="subcategoryTabs" aria-label="세부 카테고리"></div>
      </section>

      <section class="gallery-section">
        <div class="section-head">
          <p id="resultCount"></p>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>
        <p class="empty-state" id="emptyState" hidden>조건에 맞는 결과물이 없습니다.</p>
      </section>
    </main>

    <div class="modal" id="promptModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <section
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <button class="modal-close" type="button" aria-label="닫기" data-close-modal>×</button>
        <div class="modal-preview">
          <div class="modal-image" id="modalImage"></div>
          <div class="preview-actions">
            <button
              class="preview-action-button"
              type="button"
              id="expandImage"
              aria-label="이미지 크게 보기"
              title="이미지 크게 보기"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="10.5" cy="10.5" r="5.8" />
                <path d="m15 15 5 5" />
              </svg>
            </button>
            <button
              class="preview-action-button"
              type="button"
              id="downloadPreviewImage"
              aria-label="이미지 다운로드"
              title="이미지 다운로드"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 3v11" />
                <path d="m7.5 9.5 4.5 4.5 4.5-4.5" />
                <path d="M5 20h14" />
              </svg>
            </button>
          </div>
          <div class="zoom-control">
            <label for="imageZoom">돋보기</label>
            <input id="imageZoom" type="range" min="100" max="500" value="100" step="10" />
            <span id="imageZoomValue">100%</span>
          </div>
        </div>
        <div class="modal-content">
          <span class="badge" id="modalCategory"></span>
          <h2 id="modalTitle"></h2>
          <p class="source-notice">
            프롬프트 사용 시 출처(@tting_ssam)를 남겨주세요. 출처 없는 이미지의 무단 사용과 워터마크 변경을 금지합니다.
          </p>
          <div class="prompt-actions">
            <button class="copy-button" type="button" id="copyModalPrompt">프롬프트 복사</button>
            <button
              class="secondary-button subtle icon-action"
              type="button"
              id="copyPromptLink"
              aria-label="링크 공유"
              title="링크 공유"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="7" cy="12" r="2.4" />
                <circle cx="17" cy="6" r="2.4" />
                <circle cx="17" cy="18" r="2.4" />
                <path d="m9.1 10.8 5.8-3.5" />
                <path d="m9.1 13.2 5.8 3.5" />
              </svg>
            </button>
            <a
              class="ai-link"
              href="https://chat.openai.com/"
              target="_blank"
              rel="noreferrer"
              aria-label="GPT 열기"
              title="GPT"
            >
              GPT
            </a>
            <a
              class="ai-link"
              href="https://gemini.google.com/"
              target="_blank"
              rel="noreferrer"
              aria-label="Gemini 열기"
              title="Gemini"
            >
              Gemini
            </a>
          </div>
          <p id="modalDescription"></p>
          <div class="variable-panel" id="variablePanel">
            <h3>변수 입력</h3>
            <p>적용할 변수만 선택한 뒤 최종 프롬프트에 반영하세요.</p>
            <div class="variable-list" id="variableList"></div>
            <div class="variable-actions" id="variableActions">
              <button class="secondary-button" type="button" id="generatePrompt">
                변경된 프롬프트 생성
              </button>
              <button class="secondary-button subtle" type="button" id="resetPrompt">
                원래 프롬프트로 되돌리기
              </button>
            </div>
          </div>
          <div class="final-panel">
            <div class="final-panel-head">
              <h3>최종 프롬프트</h3>
              <button class="view-full-prompt" type="button" id="viewFullPrompt">
                전체보기
              </button>
            </div>
            <div class="prompt-detail" id="finalPrompt"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
      <button class="lightbox-close" type="button" id="closeLightbox" aria-label="닫기">×</button>
      <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
      <div class="lightbox-image" id="lightboxImage"></div>
    </div>

    <div class="prompt-lightbox" id="promptLightbox" aria-hidden="true">
      <div class="prompt-lightbox-backdrop" id="promptLightboxBackdrop"></div>
      <section
        class="prompt-lightbox-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="promptLightboxTitle"
      >
        <button class="lightbox-close" type="button" id="closePromptLightbox" aria-label="닫기">×</button>
        <h2 id="promptLightboxTitle">최종 프롬프트</h2>
        <div class="full-prompt-text" id="fullPromptText"></div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">프롬프트가 복사되었습니다.</div>

    <footer class="site-footer">
      <a class="footer-brand" href="#">
        <img class="brand-logo" src="images/logo.png" alt="" />
        <span>TTingSSam's Prompt Box</span>
      </a>
      <div class="footer-links" aria-label="푸터 링크">
        <a href="https://creodedulab.github.io/creod_promptbox/" target="_blank" rel="noreferrer">Creo.D</a>
        <a href="https://www.instagram.com/tting_ssam" target="_blank" rel="noreferrer">Instagram</a>
        <a href="https://www.threads.com/@tting_ssam" target="_blank" rel="noreferrer">Thread</a>
      </div>
    </footer>

    <script src="data/prompts-fallback.js?v=20260626-1"></script>
    <script src="theme.js?v=20260619-2"></script>
    <script src="script.js?v=20260624-4"></script>
  </body>
</html>
