<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creod Prompt Box</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="topbar" aria-label="주요 메뉴">
        <a class="brand" href="#">Creod Prompt Box</a>
      </nav>

      <section class="hero">
        <h1>Creod Prompt Box</h1>
      </section>
    </header>

    <main class="gallery-page">
      <section class="toolbar" aria-label="갤러리 필터">
        <form class="search-form" role="search">
          <label class="sr-only" for="searchInput">갤러리 검색</label>
          <input
            id="searchInput"
            type="search"
            placeholder="예: 제품사진, 인물, 상세페이지, 포스터"
            autocomplete="off"
          />
        </form>

        <div class="category-tabs" aria-label="카테고리">
          <button class="tab active" type="button" data-category="all">전체</button>
          <button class="tab" type="button" data-category="product">제품</button>
          <button class="tab" type="button" data-category="portrait">인물</button>
          <button class="tab" type="button" data-category="brand">브랜딩</button>
          <button class="tab" type="button" data-category="space">공간</button>
        </div>
      </section>

      <section class="gallery-section" aria-labelledby="galleryTitle">
        <div class="section-head">
          <div>
            <h2 id="galleryTitle">결과물 예시</h2>
          </div>
          <p id="resultCount"></p>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>
        <p class="empty-state" id="emptyState" hidden>조건에 맞는 결과물이 없습니다.</p>
      </section>
    </main>

    <div class="modal" id="promptModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <section
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <button class="modal-close" type="button" aria-label="닫기" data-close-modal>×</button>
        <div class="modal-image" id="modalImage"></div>
        <div class="modal-content">
          <span class="badge" id="modalCategory"></span>
          <h2 id="modalTitle"></h2>
          <p id="modalDescription"></p>
          <div class="prompt-detail" id="modalPrompt"></div>
          <div class="variable-panel" id="variablePanel">
            <h3>변수 입력</h3>
            <p>프롬프트에서 자동으로 찾은 값을 입력하면 최종 프롬프트가 완성됩니다.</p>
            <div class="variable-list" id="variableList"></div>
          </div>
          <div class="final-panel">
            <h3>최종 프롬프트</h3>
            <div class="prompt-detail" id="finalPrompt"></div>
          </div>
          <button class="copy-button" type="button" id="copyModalPrompt">최종 프롬프트 복사</button>
        </div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">프롬프트가 복사되었습니다.</div>

    <script src="script.js"></script>
  </body>
</html>
